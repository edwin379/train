<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Tokyo Metro Real-time Map</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@2.6.2/dist/maplibre-gl.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-title">Tokyo Metro Live Map</div>
        <div class="brand-subtitle">Interactive real-time Tokyo Metro network visualization</div>
      </div>

      <div class="section">
        <div class="section-title">Service status</div>
        <div id="status-summary" class="status-summary">Loading Tokyo Metro status data…</div>
      </div>

      <div class="section">
        <div class="section-title">Line filters</div>
        <div id="line-filters" class="line-filters"></div>
      </div>

      <div class="section">
        <div class="section-title">Controls</div>
        <div class="controls">
          <button id="refresh-button" class="control-button">Refresh now</button>
          <div id="last-updated" class="small-text">Waiting for first update…</div>
        </div>
      </div>

      <div class="footer">
        Data provided by Tokyo Metro ODPT open data. Train positions animate every 20 seconds.
      </div>
    </aside>

    <main class="map-wrap">
      <div id="map" class="map"></div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/maplibre-gl@2.6.2/dist/maplibre-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/protobufjs@7.2.3/dist/protobuf.min.js"></script>
  <script src="app.js" defer></script>
</body>
</html>
